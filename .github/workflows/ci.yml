name: CI Pipeline

on:
  push:
    branches:
      - project-demo
      - main
  pull_request:
    branches:
      - project-demo
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 522814724315.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    name: Build & Push Docker Images to ECR
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: gateway
            context: projects/boutique-microservices/backend/services/gateway
          - name: auth
            context: projects/boutique-microservices/backend/services/auth
          - name: product-service
            context: projects/boutique-microservices/backend/services/product-service
          - name: order-service
            context: projects/boutique-microservices/backend/services/order-service
          - name: orders
            context: projects/boutique-microservices/backend/services/orders
          - name: user-service
            context: projects/boutique-microservices/backend/services/user-service
          - name: frontend
            context: projects/boutique-microservices/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ matrix.service.name }}:$IMAGE_TAG \
                       -t $ECR_REGISTRY/${{ matrix.service.name }}:latest \
                       ${{ matrix.service.context }}
          docker push $ECR_REGISTRY/${{ matrix.service.name }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ matrix.service.name }}:latest

  update-gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update image tags in gitops manifests
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|image:.*gateway.*|image: $ECR_REGISTRY/gateway:$IMAGE_TAG|g" gitops/k8s/backend/gateway.yml
          sed -i "s|image:.*auth.*|image: $ECR_REGISTRY/auth:$IMAGE_TAG|g" gitops/k8s/backend/auth.yml
          sed -i "s|image:.*product-service.*|image: $ECR_REGISTRY/product-service:$IMAGE_TAG|g" gitops/k8s/backend/product-service.yml
          sed -i "s|image:.*order-service.*|image: $ECR_REGISTRY/order-service:$IMAGE_TAG|g" gitops/k8s/backend/order-service.yml
          sed -i "s|image:.*orders.*|image: $ECR_REGISTRY/orders:$IMAGE_TAG|g" gitops/k8s/backend/orders.yml
          sed -i "s|image:.*user-service.*|image: $ECR_REGISTRY/user-service:$IMAGE_TAG|g" gitops/k8s/backend/user-service.yml
          sed -i "s|image:.*frontend.*|image: $ECR_REGISTRY/frontend:$IMAGE_TAG|g" gitops/k8s/frontend/deployment.yml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
